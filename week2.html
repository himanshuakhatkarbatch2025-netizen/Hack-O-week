<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Menu</title>

<style>
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#fff8f0;
    color:#333;
}

header{
    background:#8b0000;
    color:white;
    text-align:center;
    padding:25px;
}

section{
    padding:30px;
    max-width:900px;
    margin:auto;
}

h2{
    border-bottom:2px solid #8b0000;
    padding-bottom:10px;
}

.menu-item{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px dashed #ccc;
}

.price{
    font-weight:bold;
    color:#8b0000;
}

footer{
    text-align:center;
    background:#8b0000;
    color:white;
    padding:15px;
    margin-top:20px;
}
</style>
</head>

<body>

<header>
    <h1>Royal Spice Restaurant</h1>
    <p>Delicious Food | Fresh Taste</p>
</header>

<section>
<h2>Starters</h2>

<div class="menu-item">
<span>Paneer Tikka</span>
<span class="price">₹180</span>
</div>

<div class="menu-item">
<span>Veg Spring Rolls</span>
<span class="price">₹150</span>
</div>

<div class="menu-item">
<span>Tomato Soup</span>
<span class="price">₹120</span>
</div>

</section>

<section>
<h2>Main Course</h2>

<div class="menu-item">
<span>Butter Paneer Masala</span>
<span class="price">₹260</span>
</div>

<div class="menu-item">
<span>Veg Biryani</span>
<span class="price">₹220</span>
</div>

<div class="menu-item">
<span>Dal Tadka</span>
<span class="price">₹200</span>
</div>

</section>

<section>
<h2>Desserts</h2>

<div class="menu-item">
<span>Gulab Jamun</span>
<span class="price">₹100</span>
</div>

<div class="menu-item">
<span>Ice Cream</span>
<span class="price">₹90</span>
</div>

<div class="menu-item">
<span>Chocolate Cake</span>
<span class="price">₹140</span>
</div>

</section>

<footer>
© 2026 Royal Spice Restaurant
</footer>

</body>
</html>
