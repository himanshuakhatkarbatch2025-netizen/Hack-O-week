<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Listing</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f2f4f7;
}

header{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:0 20px;
}

.card{
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:8px;
}

.price{
    color:#0a8f3d;
    font-weight:bold;
    margin:10px 0;
}

button{
    padding:10px 15px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

footer{
    text-align:center;
    background:#222;
    color:white;
    padding:15px;
    margin-top:30px;
}
</style>
</head>

<body>

<header>
<h1>Mini Shop</h1>
<p>Simple Product Listing</p>
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Wireless Headphones</h3>
<p class="price">₹1,999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Smart Watch</h3>
<p class="price">₹2,499</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Bluetooth Speaker</h3>
<p class="price">₹1,299</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Gaming Mouse</h3>
<p class="price">₹799</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Keyboard</h3>
<p class="price">₹999</p>
<button>Buy Now</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/250" alt="">
<h3>Power Bank</h3>
<p class="price">₹1,099</p>
<button>Buy Now</button>
</div>

</div>

<footer>
© 2026 Mini Shop
</footer>

</body>
</html>
