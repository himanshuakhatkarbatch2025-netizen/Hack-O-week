<!DOCTYPE html>
<html>
<head>
<title>Image Gallery</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.gallery{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
width:600px;
margin:auto;
}

.gallery img{
width:100%;
cursor:pointer;
border-radius:5px;
}

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#lightbox img{
max-width:80%;
max-height:80%;
border-radius:10px;
}

#close{
position:absolute;
top:20px;
right:40px;
color:white;
font-size:30px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Photo Gallery</h1>

<div class="gallery">

<img src="https://picsum.photos/id/101/300" onclick="openImg(this.src)">
<img src="https://picsum.photos/id/102/300" onclick="openImg(this.src)">
<img src="https://picsum.photos/id/103/300" onclick="openImg(this.src)">

<img src="https://picsum.photos/id/104/300" onclick="openImg(this.src)">
<img src="https://picsum.photos/id/105/300" onclick="openImg(this.src)">
<img src="https://picsum.photos/id/106/300" onclick="openImg(this.src)">

<img src="https://picsum.photos/id/107/300" onclick="openImg(this.src)">
<img src="https://picsum.photos/id/108/300" onclick="openImg(this.src)">
<img src="https://picsum.photos/id/109/300" onclick="openImg(this.src)">

</div>

<div id="lightbox">
<span id="close" onclick="closeImg()">×</span>
<img id="lightImg">
</div>

<script>

function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightImg").src=src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
